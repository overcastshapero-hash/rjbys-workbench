name: Update AI 热榜数据

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/update-aihot.mjs

      - name: Update public branch cache
        env:
          GH_TOKEN: ${{ secrets.AIHOT_TOKEN || github.token }}
        run: |
          SHA=$(gh api "repos/${{ github.repository }}/contents/aihot-latest.json?ref=public" \
            --jq '.sha // empty' 2>/dev/null || true)
          CONTENT=$(base64 -w 0 aihot-latest.json)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          if [ -z "$SHA" ]; then
            gh api --method PUT repos/${{ github.repository }}/contents/aihot-latest.json \
              --field message="data: create AI HOT cache $TIMESTAMP" \
              --field content="$CONTENT" \
              --field branch=public
          else
            gh api --method PUT repos/${{ github.repository }}/contents/aihot-latest.json \
              --field message="data: update AI HOT cache $TIMESTAMP" \
              --field content="$CONTENT" \
              --field sha="$SHA" \
              --field branch=public
          fi
